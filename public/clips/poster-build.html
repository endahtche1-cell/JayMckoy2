<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jay McKoy — Studio Poster Build (export)</title>
<style>
  :root { --bg:#00b140; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  body.checker{background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:40px 40px;background-position:0 0,0 20px,20px -20px,-20px 0;background-color:#fff}
  .stage{width:100%;height:100vh;display:flex;align-items:center;justify-content:center}
  .poster{position:relative;width:440px;height:550px;background:url('https://jaymckoy.com/studio/canvas-web.png') center/100% 100% no-repeat;
          border-radius:8px;box-shadow:0 24px 70px rgba(0,0,0,.3);opacity:0;animation:posterIn .7s ease-out forwards}
  @keyframes posterIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
  .piece{position:absolute;opacity:0}
  .piece img{width:100%;height:auto;display:block}
  /* each piece flies in: starts off its mark + rotated + small, lands at --fr rotation */
  @keyframes fly{
    from{opacity:0;transform:translate(var(--fx),var(--fy)) rotate(var(--fri)) scale(.4)}
    60%{opacity:1}
    to{opacity:1;transform:translate(0,0) rotate(var(--fr)) scale(1)}
  }
  .controls{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;z-index:10;background:rgba(0,0,0,.55);color:#fff;padding:8px 12px;border-radius:999px;font:13px/1 system-ui,sans-serif}
  .controls.hidden{display:none}.sw{width:22px;height:22px;border-radius:50%;border:2px solid #fff;cursor:pointer}
  .controls button{background:#fff2;color:#fff;border:1px solid #fff5;border-radius:999px;padding:5px 10px;cursor:pointer;font:inherit}
</style>
</head>
<body>
  <div class="controls" id="ui">
    <span class="sw" style="background:#00b140" onclick="setBg('#00b140')"></span>
    <span class="sw" style="background:#fff" onclick="setBg('#fff')"></span>
    <span class="sw" style="background:#8C2257" onclick="setBg('#8C2257')"></span>
    <button onclick="document.body.classList.add('checker')">Transparent preview</button>
    <button onclick="replay()">Replay</button>
    <button onclick="document.getElementById('ui').classList.add('hidden')">Hide UI (H)</button>
  </div>
  <div class="stage"><div class="poster" id="poster"></div></div>
<script>
  const B='https://jaymckoy.com/studio/v2/';
  // letters: A=9 ... Z=34.  K=19 I=17 M=21  T=28 A=9 L=20 K=19 S=27
  // [src, left, top, width, finalRotateDeg, delay s]
  const PIECES=[
    // KIM — top
    [B+'letters/19.png',  95, 45, 82, -4, .6],   // K
    [B+'letters/17.png', 185, 45, 70, 3, .9],    // I
    [B+'letters/21.png', 255, 45, 92, -3, 1.2],  // M
    // character — middle
    [B+'characters/35.png', 150, 150, 150, 0, 1.6],
    // TALKS — bottom
    [B+'letters/28.png',  42, 395, 70, -5, 2.0], // T
    [B+'letters/9.png',  108, 395, 70, 4, 2.2],  // A
    [B+'letters/20.png', 175, 395, 64, -3, 2.4], // L
    [B+'letters/19.png', 235, 395, 70, 5, 2.6],  // K
    [B+'letters/27.png', 300, 395, 70, -4, 2.8], // S
    // stickers all around
    [B+'stickers/45.png', 330, 110, 85, 14, 1.35],
    [B+'stickers/48.png',  25, 270, 78, -14, 3.0],
    [B+'stickers/50.png', 345, 320, 80, 18, 3.2],
    [B+'stickers/43.png',  35, 100, 70, -10, 1.5],
  ];
  const poster=document.getElementById('poster');
  function build(){
    poster.querySelectorAll('.piece').forEach(n=>n.remove());
    PIECES.forEach(([src,l,t,w,fr,d])=>{
      const el=document.createElement('div'); el.className='piece';
      el.style.left=l+'px'; el.style.top=t+'px'; el.style.width=w+'px';
      el.style.setProperty('--fr',fr+'deg');
      el.style.setProperty('--fri',(fr+(Math.random()*120-60))+'deg');
      el.style.setProperty('--fx',(Math.random()*700-350)+'px');
      el.style.setProperty('--fy',(Math.random()*500-250)+'px');
      el.style.animation=`fly .8s cubic-bezier(.2,.8,.2,1) ${d}s forwards`;
      const img=document.createElement('img'); img.crossOrigin='anonymous'; img.src=src;
      el.appendChild(img); poster.appendChild(el);
    });
  }
  function replay(){ poster.style.animation='none'; void poster.offsetWidth; poster.style.animation='posterIn .7s ease-out forwards'; build(); }
  build();
  function setBg(c){document.body.classList.remove('checker');document.documentElement.style.setProperty('--bg',c)}
  addEventListener('keydown',e=>{if(e.key.toLowerCase()==='h')document.getElementById('ui').classList.toggle('hidden')});
</script>
</body>
</html>
