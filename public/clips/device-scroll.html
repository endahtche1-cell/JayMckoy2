<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jay McKoy — Device Scroll-through (export)</title>
<style>
  :root { --bg:#00b140; }
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  body.checker{background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:40px 40px;background-position:0 0,0 20px,20px -20px,-20px 0;background-color:#fff}
  .stage{width:100%;height:100vh;display:flex;align-items:center;justify-content:center}
  /* phone bezel */
  .phone{position:relative;width:392px;height:812px;background:#111;border-radius:54px;padding:14px;
         box-shadow:0 30px 80px rgba(0,0,0,.45)}
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#111;border-radius:0 0 18px 18px;z-index:3}
  .screen{position:relative;width:100%;height:100%;border-radius:40px;overflow:hidden;background:#fff}
  .scroller{position:absolute;top:0;left:0;width:100%;height:var(--ih);
            animation:scroll var(--dur,26s) ease-in-out infinite}
  iframe{width:100%;height:100%;border:0;display:block}
  @keyframes scroll{
    0%,8%{transform:translateY(0)}
    50%{transform:translateY(calc(-1 * (var(--ih) - 784px)))}
    92%,100%{transform:translateY(0)}
  }
  .controls{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;z-index:10;background:rgba(0,0,0,.6);color:#fff;padding:8px 12px;border-radius:999px;font-size:13px}
  .controls.hidden{display:none}.sw{width:22px;height:22px;border-radius:50%;border:2px solid #fff;cursor:pointer}
  .controls button,.controls select{background:#fff2;color:#fff;border:1px solid #fff5;border-radius:999px;padding:5px 10px;cursor:pointer;font:inherit}
  .controls select option{color:#000}
</style>
</head>
<body>
  <div class="controls" id="ui">
    <span class="sw" style="background:#00b140" onclick="setBg('#00b140')"></span>
    <span class="sw" style="background:#fff" onclick="setBg('#fff')"></span>
    <span class="sw" style="background:#8C2257" onclick="setBg('#8C2257')"></span>
    <select id="page" onchange="load()">
      <option value="/commission">Commission</option>
      <option value="/about">About</option>
      <option value="/">Home</option>
      <option value="/doodle">Studio</option>
    </select>
    <button onclick="document.body.classList.add('checker')">Transparent preview</button>
    <button onclick="document.getElementById('ui').classList.add('hidden')">Hide UI (H)</button>
  </div>
  <div class="stage">
    <div class="phone">
      <div class="notch"></div>
      <div class="screen">
        <div class="scroller" id="scroller"><iframe id="frame" title="site"></iframe></div>
      </div>
    </div>
  </div>
<script>
  // Taller iframe than the screen so the CSS transform scrolls through the page.
  const HEIGHTS={ '/commission':2700, '/about':2400, '/':1500, '/doodle':820 };
  function load(){
    const p=document.getElementById('page').value;
    const ih=HEIGHTS[p]||2200;
    document.getElementById('scroller').style.setProperty('--ih', ih+'px');
    document.getElementById('frame').src='https://jaymckoy.com'+p+'?v='+Date.now();
  }
  load();
  function setBg(c){document.body.classList.remove('checker');document.documentElement.style.setProperty('--bg',c)}
  addEventListener('keydown',e=>{if(e.key.toLowerCase()==='h')document.getElementById('ui').classList.toggle('hidden')});
</script>
</body>
</html>
