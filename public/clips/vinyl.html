<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jay McKoy — Spinning Vinyl (export)</title>
<style>
  :root { --bg:#00b140; --spin:4s; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; background:var(--bg); }
  body.checker { background-image:
      linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);
      background-size:40px 40px; background-position:0 0,0 20px,20px -20px,-20px 0; background-color:#fff; }
  .stage { width:100%; height:100vh; display:flex; align-items:center; justify-content:center; }
  .vinyl { position:relative; width:min(60vmin,460px); height:min(60vmin,460px); }
  .disc { width:100%; height:100%; border-radius:50%; overflow:hidden;
          animation:spin var(--spin) linear infinite; box-shadow:0 20px 60px rgba(0,0,0,.35); }
  .disc img { width:100%; height:100%; object-fit:cover; display:block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .cover { position:absolute; top:50%; left:50%; width:34%; height:34%; transform:translate(-50%,-50%);
           border-radius:50%; overflow:hidden; box-shadow:0 0 0 6px rgba(0,0,0,.25); }
  .cover img { width:100%; height:100%; object-fit:cover; display:block; }
  .hole { position:absolute; top:50%; left:50%; width:5%; height:5%; transform:translate(-50%,-50%);
          background:var(--bg); border-radius:50%; z-index:2; }
  .controls { position:fixed; top:14px; left:50%; transform:translateX(-50%); display:flex; gap:8px;
              align-items:center; z-index:10; background:rgba(0,0,0,.55); color:#fff; padding:8px 12px;
              border-radius:999px; font:13px/1 system-ui,sans-serif; }
  .controls.hidden { display:none; }
  .sw { width:22px; height:22px; border-radius:50%; border:2px solid #fff; cursor:pointer; }
  .controls button { background:#fff2; color:#fff; border:1px solid #fff5; border-radius:999px; padding:5px 10px; cursor:pointer; font:inherit; }
</style>
</head>
<body>
  <div class="controls" id="ui">
    <span class="sw" style="background:#00b140" onclick="setBg('#00b140')"></span>
    <span class="sw" style="background:#fff" onclick="setBg('#fff')"></span>
    <span class="sw" style="background:#8C2257" onclick="setBg('#8C2257')"></span>
    <button onclick="document.body.classList.add('checker')">Transparent preview</button>
    <input type="range" min="2" max="10" value="4" oninput="document.documentElement.style.setProperty('--spin',this.value+'s')" />
    <button onclick="document.getElementById('ui').classList.add('hidden')">Hide UI (H)</button>
  </div>
  <div class="stage">
    <div class="vinyl">
      <div class="disc"><img src="https://jaymckoy.com/music/vinyl.jpg" crossorigin="anonymous" alt=""></div>
      <div class="cover"><img src="https://jaymckoy.com/music/cover.jpg" crossorigin="anonymous" alt=""></div>
      <div class="hole"></div>
    </div>
  </div>
<script>
  function setBg(c){ document.body.classList.remove('checker'); document.documentElement.style.setProperty('--bg',c); }
  addEventListener('keydown',e=>{ if(e.key.toLowerCase()==='h') document.getElementById('ui').classList.toggle('hidden'); });
</script>
</body>
</html>
